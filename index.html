<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlopLens - Inteligencia Táctica</title>
    <style>
        body {
            background-color: #0a0a1a; /* Fondo oscuro espacial */
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;

            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); /* Resplandor azul */
            border: 2px solid #00d2ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenido al futuro del póker</h1>
        <img src="assets/web1.png" alt="FlopLens - Humanos e IA colaborando en el espacio" class="imagen-hero">
